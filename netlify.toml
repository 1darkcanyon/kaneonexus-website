[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_PATHS = "netlify/functions"

# ── Force HTTPS on every request ──
[[redirects]]
  from = "http://kaneonexus.net/*"
  to = "https://kaneonexus.net/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.kaneonexus.net/*"
  to = "https://kaneonexus.net/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.kaneonexus.net/*"
  to = "https://kaneonexus.net/:splat"
  status = 301
  force = true

# ── Security headers for all pages ──
[[headers]]
  for = "/*"
  [headers.values]
    # Enforce HTTPS for 1 year, including subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Prevent clickjacking
    X-Frame-Options = "DENY"

    # Stop MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Control Referer header — send origin only to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Block access to browser features the site doesn't need
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

    # Prevent XSS in older browsers
    X-XSS-Protection = "1; mode=block"

    # Content-Security-Policy — allow only what the site actually uses
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; media-src 'self'; connect-src 'self' https://api.anthropic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

# ── Cache static assets with immutable headers ──
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Netlify Functions headers ──
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Content-Type-Options = "nosniff"
